<script>
  /* Mobile-only: collapse the sort tabs into a "Sort" dropdown.
     Engine keeps its own .seg-btn listeners; this only toggles the popover + label. */
  (function(){
    var btn = document.getElementById('sort-btn'),
        pop = document.getElementById('sort-pop'),
        lbl = document.getElementById('sort-label');
    if (!btn || !pop) return;
    function setOpen(o){ pop.classList.toggle('open', o); btn.setAttribute('aria-expanded', String(o)); }
    btn.addEventListener('click', function(e){ e.stopPropagation(); setOpen(!pop.classList.contains('open')); });
    pop.addEventListener('click', function(e){
      var b = e.target.closest('.seg-btn');
      if (b){ if (lbl) lbl.textContent = b.textContent; setOpen(false); }
    });
    document.addEventListener('click', function(e){ if (!e.target.closest('.sort-wrap')) setOpen(false); });
  })();

  /* Once scrolled, the top-left home button becomes a back-to-top control. */
  (function(){
    var btn = document.getElementById('home-btn');
    if (!btn) return;
    var THRESHOLD = 400;
    function sync(){
      var scrolled = window.scrollY > THRESHOLD;
      btn.classList.toggle('to-top', scrolled);
      btn.setAttribute('aria-label', scrolled ? 'Back to top' : 'Home');
      btn.setAttribute('title', scrolled ? 'Back to top' : 'Home');
    }
    btn.addEventListener('click', function(e){
      if (!btn.classList.contains('to-top')) return;        // at the top → act as the home link
      e.preventDefault();
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' });
    });
    window.addEventListener('scroll', sync, { passive: true });
    sync();
  })();
</script>
