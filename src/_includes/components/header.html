<header id="navigation">
  <div class="container">
    <nav class="nav" role="navigation">
      <button class="toggle" aria-label="mobile menu toggle">
        <div class="box" aria-hidden="true">
          <span class="line line1" aria-hidden="true"></span>
          <span class="line line2" aria-hidden="true"></span>
          <span class="line line3" aria-hidden="true"></span>
        </div>
      </button>
    <div class="ul-wrapper">
        <ul id="expanded" class="ul" aria-expanded="false">
          <li class="li">
            <a href="/" class="li-link"> Home </a>
          </li>
          <li class="li">
            <a href="/project" class="li-link"> Projects </a>
          </li>
          <li class="li">
            <a href="/blog" class="li-link"> Blogs </a>
          </li>
          <li class="li">
            <a href="/cbd" class="li-link"> CBD Twin </a>
          </li>
          <li class="li">
            <a href="/mastering" class="li-link"> Mastering </a>
          </li>
          <li class="li">
            <a href="/#contact" class="li-link"> Contact </a>
          </li>
        </ul>
      </div>
    </nav>
    <button id="dark-mode-toggle" aria-label="dark mode toggle">
      <svg class="moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="sun" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
    </button>
    </div>
    
  </div>
</header>
<script>
  (function() {
    var path = window.location.pathname.replace(/\/$/, '') || '/';
    document.querySelectorAll('#navigation .li-link').forEach(function(a) {
      var href = a.getAttribute('href').split('#')[0].replace(/\/$/, '') || '/';
      if (href === path) a.classList.add('active');
    });
  })();
</script>
